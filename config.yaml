points:
  zones:
    matrix:
      columns:
        outer:
          key:
            column_net: P020
        pinky:
          key:
            column_net: P022
        ring:
          key:
            stagger: 12
            column_net: P024
        middle:
          key:
            stagger: 7
            column_net: P100
        index:
          key:
            stagger: -6
            column_net: P011
        inner:
          key:
            stagger: -2
            column_net: P017

      rows:
        num:
          row_net: P113
        bottom:
          row_net: P115
        home:
          row_net: P002
        top:
          row_net: P029
        mod:
          row_net: P031
outlines:
  left:
    - where: true
      bound: true
      what: rectangle
      size: [cx + 2, cy + 2]
      fillet: 3
pcbs:
  left:
    outlines:
      main:
        outline: left
    footprints:
      keyswitches:
        where: true
        what: choc
        params:
          hotswap: true
          from: "{{column_net}}" 
          to: "{{colrow}}"
      diodes:
        where: true
        what: diode
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
      nice_nano:
        what: nice_nano
        params:
          orientation: up
        where:
          ref: matrix_inner_mod
          shift: [-9, -2]
      battery_jack:
        what: jstph
        params:
          pos: 'RAW'   
          neg: "GND"       # <-- FIX: Added the required 'pos' string parameter
        where:
          ref: matrix_inner_top
          shift: [12, 0]


      # Power Switch on the right edge (below the battery)
      power_switch:
        what: slider
        params:
          from: RAW         # Connects to the battery's positive terminal
          to: RAW           # Connects to the Nice!Nano's RAW pin
        where:
          ref: matrix_inner_home
          shift: [12, 0]
          rotate: -90