points:
  zones:
    matrix:
      columns:
        outer:
          key:
            column_net: P020
        pinky:
          key:
            column_net: P022
        ring:
          key:
            stagger: 12
            column_net: P024
        middle:
          key:
            stagger: 7
            column_net: P100
        index:
          key:
            stagger: -6
            column_net: P011
        inner:
          key:
            stagger: -2
            column_net: P017

      rows:
        num:
          row_net: P113
        bottom:
          row_net: P115
        home:
          row_net: P002
        top:
          row_net: P029
        mod:
          row_net: P031
outlines:
  left:
    - where: true
      what: rectangle
      size: [cx + 2, cy + 2]
      fillet: 2
pcbs:
  left:
    outlines:
      main:
        outline: left
    footprints:
      keyswitches:
        where: /matrix/
        what: choc
        params:
          hotswap: true
          from: "{{column_net}}"
          to: "{{row_net}}"

      nice_nano:
        what: nice_nano
        params:
          orientation: up
        where:
          ref: matrix_inner_home
          shift: [-9, -2]