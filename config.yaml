points:
  key:
    autobind: 10
  zones:
    matrix:
      columns:
        outer:
          key:
            column_net: P020
        pinky:
          key:
            column_net: P022
        ring:
          key:
            stagger: 12
            column_net: P024
        middle:
          key:
            stagger: 7
            column_net: P100
        index:
          key:
            stagger: -6
            column_net: P011
        inner:
          key:
            stagger: -2
            column_net: P017
      rows:
        mod:
          row_net: P031
        bottom:
          row_net: P115
        home:
          row_net: P002
        top:
          row_net: P029
        num:
          row_net: P113

outlines:
  exports:
    main:
      what: rectangle
      where: true
      size: [19, 19]
      bound: true
      fillet: 2
      
  left_outline:
    main:
      name: exports
      where: true
      asym: source
      
  right_outline:
    main:
      name: exports
      where: true
      asym: clone

pcbs:
  right:
    outlines:
      main:
        outline: right_outline
    footprints:
      keyswitches:
        what: choc
        where: true
        asym: clone
        params:
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"
      diodes:
        what: diode
        where: true
        asym: clone
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
      nice_nano:
        what: nice_nano
        where:
          ref: mirror_matrix_inner_num
          shift: [9, 18]
          rotate: -90
        params:
          orientation: up
      battery_jack:
        what: jstph
        where:
          ref: mirror_matrix_inner_top
          shift: [-12, 0]
          rotate: -90
        params:
          pos: 'RAW'
          neg: 'GND'
      power_switch:
        what: slider
        where:
          ref: mirror_matrix_inner_home
          shift: [-12, 0]
          rotate: -90
        params:
          from: RAW
          to: RAW
